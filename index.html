<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채널 통합 SEO 상품명 조합기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-6 rounded-lg shadow-sm mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 mb-1">채널 통합 SEO 상품명 조합기</h1>
                <p class="text-gray-500 text-sm">입력한 키워드를 바탕으로 각 플랫폼 규칙에 맞는 상품명을 자동 완성합니다.</p>
            </div>
            <a href="https://ma-pia.net/keyword/keyword.php" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-5 py-2.5 rounded shadow-md transition flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                관련 키워드 확인
            </a>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm mb-6 grid grid-cols-1 md:grid-cols-5 gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">브랜드명</label>
                <input type="text" id="inputBrand" value="" class="w-full border-gray-300 rounded border p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="브랜드명">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">메인 키워드</label>
                <input type="text" id="inputMain" value="" class="w-full border-gray-300 rounded border p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="시리즈명">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">속성/서브 키워드</label>
                <input type="text" id="inputSub" value="" class="w-full border-gray-300 rounded border p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="상품명칭">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">옵션/사이즈</label>
                <input type="text" id="inputOption" value="" class="w-full border-gray-300 rounded border p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="옵션명">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">감성/홍보 수식어</label>
                <input type="text" id="inputMod" value="" class="w-full border-gray-300 rounded border p-2 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="상품특징">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold text-gray-800">🟢 네이버 스마트스토어</h2>
                    <span id="lenNaver" class="text-sm font-semibold px-2 py-1 rounded bg-gray-100 text-gray-600">0 / 50자</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="outNaver" class="w-full border-gray-200 rounded border p-3 bg-gray-50 text-gray-800 font-medium" readonly>
                    <button onclick="copyText('outNaver', this)" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm whitespace-nowrap transition">복사</button>
                </div>
                <p id="warnNaver" class="text-red-500 text-xs mt-2 hidden">⚠️ 네이버 SEO 권장 글자 수(50자)를 초과했습니다!</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-red-500">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold text-gray-800">🔴 쿠팡 (로켓/윙)</h2>
                    <span id="lenCoupang" class="text-sm font-semibold px-2 py-1 rounded bg-gray-100 text-gray-600">0 자</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="outCoupang" class="w-full border-gray-200 rounded border p-3 bg-gray-50 text-gray-800 font-medium" readonly>
                    <button onclick="copyText('outCoupang', this)" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm whitespace-nowrap transition">복사</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold text-gray-800">🏠 오늘의집</h2>
                    <span id="lenOhouse" class="text-sm font-semibold px-2 py-1 rounded bg-gray-100 text-gray-600">0 자</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="outOhouse" class="w-full border-gray-200 rounded border p-3 bg-gray-50 text-gray-800 font-medium" readonly>
                    <button onclick="copyText('outOhouse', this)" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm whitespace-nowrap transition">복사</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-purple-500">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-lg font-bold text-gray-800">🟣 종합몰 (롯데온/SSG 등)</h2>
                    <span id="lenGeneral" class="text-sm font-semibold px-2 py-1 rounded bg-gray-100 text-gray-600">0 자</span>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="outGeneral" class="w-full border-gray-200 rounded border p-3 bg-gray-50 text-gray-800 font-medium" readonly>
                    <button onclick="copyText('outGeneral', this)" class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm whitespace-nowrap transition">복사</button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-indigo-500 mt-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h2 class="text-lg font-bold text-gray-800 mb-1">📊 연관 검색어 트래픽 분석</h2>
                <p class="text-sm text-gray-500">상품명을 복사한 뒤, 우측 버튼을 눌러 연관 키워드의 실시간 검색수를 확인해 보세요.</p>
            </div>
            <a href="https://ma-pia.net/keyword/keyword.php" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-6 py-3 rounded shadow-md transition flex items-center gap-2 whitespace-nowrap">
                🔍 관련 키워드 확인
            </a>
        </div>

    </div>

    <script>
        const inputs = ['inputBrand', 'inputMain', 'inputSub', 'inputOption', 'inputMod'];
        inputs.forEach(id => {
            document.getElementById(id).addEventListener('input', generateNames);
        });

        function cleanText(text) {
            return text.replace(/\s+/g, ' ').trim();
        }

        function generateNames() {
            const brand = document.getElementById('inputBrand').value.trim();
            const main = document.getElementById('inputMain').value.trim(); 
            const sub = document.getElementById('inputSub').value.trim();   
            const opt = document.getElementById('inputOption').value.trim();
            const mod = document.getElementById('inputMod').value.trim();   

            // 상품명 조합 로직
            let naverRaw = `${brand} ${main} ${sub} ${opt}`;
            let naverRes = cleanText(naverRaw.replace(/[\[\]\(\)\!\?\,]/g, ''));
            
            let coupangRes = cleanText(`${brand} ${main} ${sub}${opt ? ', ' + opt : ''}`);
            
            let brandBracket = brand ? `[${brand}]` : '';
            let optBracket = opt ? `(${opt})` : '';
            let ohouseRes = cleanText(`${brandBracket} ${mod} ${main} ${sub} ${optBracket}`);

            let generalRes = cleanText(`${brandBracket} ${main} ${sub} ${opt}`);

            // 화면 업데이트
            document.getElementById('outNaver').value = naverRes;
            document.getElementById('outCoupang').value = coupangRes;
            document.getElementById('outOhouse').value = ohouseRes;
            document.getElementById('outGeneral').value = generalRes;

            document.getElementById('lenNaver').innerText = `${naverRes.length} / 50자`;
            document.getElementById('lenCoupang').innerText = `${coupangRes.length} 자`;
            document.getElementById('lenOhouse').innerText = `${ohouseRes.length} 자`;
            document.getElementById('lenGeneral').innerText = `${generalRes.length} 자`;

            const warnNaver = document.getElementById('warnNaver');
            const lenNaverBadge = document.getElementById('lenNaver');
            if (naverRes.length > 50) {
                warnNaver.classList.remove('hidden');
                lenNaverBadge.classList.replace('bg-gray-100', 'bg-red-100');
                lenNaverBadge.classList.replace('text-gray-600', 'text-red-600');
            } else {
                warnNaver.classList.add('hidden');
                lenNaverBadge.classList.replace('bg-red-100', 'bg-gray-100');
                lenNaverBadge.classList.replace('text-red-600', 'text-gray-600');
            }
        }

        function copyText(inputId, btnElement) {
            const copyText = document.getElementById(inputId);
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);

            const originalText = btnElement.innerText;
            btnElement.innerText = "복사 완료!";
            btnElement.classList.replace('bg-gray-800', 'bg-blue-600');
            
            setTimeout(() => {
                btnElement.innerText = originalText;
                btnElement.classList.replace('bg-blue-600', 'bg-gray-800');
            }, 1500);
        }

        window.onload = generateNames;
    </script>
</body>
</html>
